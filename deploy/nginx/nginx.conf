# WebSocket Upgrade 헤더 처리
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream llm_admin {
    server llm-admin:3000;
}

upstream orchestration {
    server app:8000;
}

server {
    listen 80;

    # WebSocket 포함 API 요청 → orchestration
    # (ws://host/api/v1/voice-evaluation/ws/conversation 도 이 블록에서 처리됨)
    location /api/ {
        proxy_pass http://orchestration;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;  # WebSocket 장시간 연결 유지
    }

    # Next.js 앱 (페이지, 정적 파일, SSE 스트리밍)
    location / {
        proxy_pass http://llm_admin;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # SSE(스트리밍) 응답을 위한 버퍼 비활성화
        proxy_buffering off;
        proxy_cache off;
    }
}
