# WebSocket Upgrade 헤더 처리
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;

    # Docker 내부 DNS 리졸버 (동적 업스트림 해결 — 컨테이너 재시작 대응)
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;

    # WebSocket 포함 API 요청 → orchestration
    # (ws://host/api/v1/voice-evaluation/ws/conversation 도 이 블록에서 처리됨)
    location /api/ {
        set $upstream_app app:8000;
        proxy_pass http://$upstream_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;  # WebSocket 장시간 연결 유지
        # SSE 스트리밍 응답을 위한 버퍼 비활성화
        proxy_buffering off;
        proxy_cache off;
    }

    # Next.js 앱 (페이지, 정적 파일, SSE 스트리밍)
    location / {
        set $upstream_admin llm-admin:3000;
        proxy_pass http://$upstream_admin;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # SSE(스트리밍) 응답을 위한 버퍼 비활성화
        proxy_buffering off;
        proxy_cache off;
    }
}
