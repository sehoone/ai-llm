services:
  # ─────────────────────────────────────────────
  # Nginx 리버스 프록시 (단일 진입점)
  #   http://1.1.1.1:8060       → llm-admin (Next.js)
  #   http://1.1.1.1:8060/api/* → orchestration (FastAPI)
  #   ws://1.1.1.1:8060/api/*   → orchestration (WebSocket)
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "8060:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - llm-admin
      - app
    networks:
      - app-network
    restart: always

  # ─────────────────────────────────────────────
  # llm-admin (Next.js 프론트엔드)
  # ─────────────────────────────────────────────
  llm-admin:
    build:
      context: ../admin/llm-admin
      dockerfile: Dockerfile
      args:
        # .env.production 에서 NEXT_PUBLIC_* 빌드타임 변수 주입
        ENV_FILE: .env.production
    container_name: llm-admin
    environment:
      - NODE_ENV=production
      # Next.js server-side rewrite용 (직접 컨테이너 통신)
      # Nginx 방식에서는 브라우저→Nginx→app 경로를 쓰므로 보조 용도
      - API_URL=http://app:8000
    networks:
      - app-network
    restart: always

  # ─────────────────────────────────────────────
  # orchestration (FastAPI 백엔드)
  # ─────────────────────────────────────────────
  app:
    build:
      context: ../orchestration
      args:
        APP_ENV: ${APP_ENV:-production}
    container_name: orchestration-app
    env_file:
      - ../orchestration/.env.${APP_ENV:-production}
    environment:
      - APP_ENV=${APP_ENV:-production}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─────────────────────────────────────────────
  # PostgreSQL + pgvector
  # ─────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: orchestration-db
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-mydb}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    ports:
      - "8066:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-mydb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: always

  # ─────────────────────────────────────────────
  # Langfuse (LLM 관찰/추적)
  #   http://1.1.1.1:8067  → Langfuse UI
  # ─────────────────────────────────────────────
  langfuse:
    image: langfuse/langfuse:3
    container_name: langfuse
    ports:
      - "8067:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/langfuse
      - NEXTAUTH_URL=${LANGFUSE_NEXTAUTH_URL:-http://localhost:8067}
      - NEXTAUTH_SECRET=${LANGFUSE_NEXTAUTH_SECRET}
      - SALT=${LANGFUSE_SALT}
      - ENCRYPTION_KEY=${LANGFUSE_ENCRYPTION_KEY}
      - TELEMETRY_ENABLED=false
      - LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES=false
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    restart: always

  # ─────────────────────────────────────────────
  # Prometheus (메트릭 수집)
  #   http://1.1.1.1:8063  → Prometheus UI
  # ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "8063:9090"
    volumes:
      - ../orchestration/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - app-network
    restart: always

  # ─────────────────────────────────────────────
  # Grafana (메트릭 시각화)
  #   http://1.1.1.1:8064  → Grafana UI
  # ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "8064:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
      - ../orchestration/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ../orchestration/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    networks:
      - app-network
    restart: always

  # ─────────────────────────────────────────────
  # cAdvisor (컨테이너 리소스 메트릭)
  #   http://1.1.1.1:8065  → cAdvisor UI
  # ─────────────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    privileged: true
    ports:
      - "8065:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    networks:
      - app-network
    restart: always

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
  grafana-storage:
  prometheus-data:
