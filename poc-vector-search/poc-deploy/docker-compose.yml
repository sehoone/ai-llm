version: '3.8'

services:
  # ── 1. PostgreSQL + pgvector ─────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: poc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-poc_vector}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-poc_vector}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - poc-net

  # ── 2. Spring Boot (vector-server) ───────────────────────
  vector-server:
    build:
      context: ../vector-server
      dockerfile: Dockerfile
    container_name: poc-vector-server
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL:          jdbc:postgresql://postgres:5432/${POSTGRES_DB:-poc_vector}
      SPRING_DATASOURCE_USERNAME:     ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD:     ${POSTGRES_PASSWORD:-postgres}
      # Docker 배포 시 스키마 생성은 init.sql(docker-entrypoint-initdb.d)이 담당
      # application.yml의 spring.sql.init.mode=always 를 덮어써 Spring Boot init 비활성화
      SPRING_SQL_INIT_MODE:           never
      JWT_SECRET:                     ${JWT_SECRET:-poc-vector-search-jwt-secret-key-32ch!!}
      AZURE_OPENAI_API_KEY:           ${AZURE_OPENAI_API_KEY}
      AZURE_OPENAI_ENDPOINT:          ${AZURE_OPENAI_ENDPOINT}
      AZURE_OPENAI_DEPLOYMENT_NAME:   ${AZURE_OPENAI_DEPLOYMENT_NAME:-text-embedding-3-small}
      AZURE_OPENAI_API_VERSION:       ${AZURE_OPENAI_API_VERSION:-2024-02-01}
      # Java 8u492에서 TLS 1.3 협상 실패 방지 — Azure는 TLS 1.2도 지원
      JAVA_TOOL_OPTIONS:              "-Dhttps.protocols=TLSv1.2 -Djdk.tls.client.protocols=TLSv1.2"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # GET /api/v1/auth/login → 405 응답 헤더 수신 확인 (Alpine busybox wget 호환)
      test: ["CMD-SHELL", "wget -qSO /dev/null http://localhost:8080/api/v1/auth/login 2>&1 | grep -q HTTP"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - poc-net

  # ── 3. Next.js (admin-front) ─────────────────────────────
  admin-front:
    build:
      context: ../admin-front
      dockerfile: Dockerfile
      args:
        ENV_FILE: .env.production   # NEXT_PUBLIC_API_URL="" (빈값) → Nginx 경유
    container_name: poc-admin-front
    restart: unless-stopped
    environment:
      API_URL: http://vector-server:8080   # SSR 리라이트용
    depends_on:
      vector-server:
        condition: service_healthy
    networks:
      - poc-net

  # ── 4. Nginx (리버스 프록시) ──────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: poc-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - admin-front
      - vector-server
    networks:
      - poc-net

networks:
  poc-net:
    driver: bridge

volumes:
  pgvector_data:
