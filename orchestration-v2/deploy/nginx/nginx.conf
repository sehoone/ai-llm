# WebSocket Upgrade 헤더 처리
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;

    # JSON 파일 업로드 허용 크기 (기본 1MB → 10MB)
    client_max_body_size 10m;

    # Docker 내부 DNS 리졸버 (컨테이너 재시작 대응)
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;

    # ── WebSocket 전용 (Spring MVC 프록시 불가 → orchestrator 직접 연결) ──
    location /api/v1/voice-evaluation/ws/ {
        set $upstream_app app:8000;
        proxy_pass http://$upstream_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # ── 모든 API → platform-server (단일 진입점) ──────────────────────
    # platform-server 내부에서:
    #   /auth, /users, /api-keys, /llm-resources → 직접 처리
    #   그 외 /api/* → orchestrator-server로 내부 프록시
    location /api/ {
        set $upstream_platform platform:8080;
        proxy_pass http://$upstream_platform;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # SSE 스트리밍을 위한 버퍼 비활성화
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400;
        # orchestrator가 내부 컨테이너 hostname으로 redirect 할 경우 재작성
        proxy_redirect http://app:8000/ http://$http_host/;
    }

    # ── Next.js 프론트엔드 ─────────────────────────────────────────────
    location / {
        set $upstream_admin llm-admin:3000;
        proxy_pass http://$upstream_admin;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_cache off;
    }
}
