services:
  # ─────────────────────────────────────────────
  # Nginx 리버스 프록시 (단일 진입점)
  #   http://1.1.1.1:8060       → llm-admin (Next.js)
  #   http://1.1.1.1:8060/api/* → orchestration (FastAPI)
  #   ws://1.1.1.1:8060/api/*   → orchestration (WebSocket)
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "8060:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - llm-admin
      - app
      - platform
    networks:
      - app-network
    restart: always

  # ─────────────────────────────────────────────
  # llm-admin (Next.js 프론트엔드)
  # ─────────────────────────────────────────────
  llm-admin:
    build:
      context: ../admin-front
      dockerfile: Dockerfile
      args:
        # .env.production 에서 NEXT_PUBLIC_* 빌드타임 변수 주입
        ENV_FILE: .env.production
    container_name: llm-admin
    environment:
      - NODE_ENV=production
      # Next.js server-side rewrite → platform-server 경유 (orchestrator 직접 접근 차단)
      - API_URL=http://platform:8080
    networks:
      - app-network
    restart: always

  # ─────────────────────────────────────────────
  # platform-server (Spring Boot — 인증/사용자/LLM 리소스)
  # ─────────────────────────────────────────────
  platform:
    build:
      context: ../platform-server
    container_name: platform-server
    env_file:
      - ../orchestrator-server/.env.${APP_ENV:-production}
    environment:
      - APP_ENV=${APP_ENV:-production}
      - SERVER_PORT=8080
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ─────────────────────────────────────────────
  # orchestration (FastAPI 백엔드)
  # ─────────────────────────────────────────────
  app:
    build:
      context: ../orchestrator-server
      args:
        APP_ENV: ${APP_ENV:-production}
    container_name: orchestration-app
    env_file:
      - ../orchestrator-server/.env.${APP_ENV:-production}
    environment:
      - APP_ENV=${APP_ENV:-production}
    depends_on:
      db:
        condition: service_healthy
      platform:
        condition: service_healthy
    networks:
      - app-network
    restart: on-failure
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─────────────────────────────────────────────
  # PostgreSQL + pgvector
  # ─────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: orchestration-db
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-mydb}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    ports:
      - "8066:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-mydb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: always

  # ─────────────────────────────────────────────
  # ClickHouse (Langfuse v3 의존성)
  # ─────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.1
    container_name: clickhouse
    hostname: clickhouse
    environment:
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-clickhouse}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse/config.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - app-network
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # MinIO (Langfuse v3 S3 스토리지)
  # ─────────────────────────────────────────────
  minio:
    image: minio/minio
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minio
      - MINIO_ROOT_PASSWORD=miniosecret
    volumes:
      - minio-data:/data
    networks:
      - app-network
    restart: always
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Redis (Langfuse v3 의존성)
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    networks:
      - app-network
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Langfuse (LLM 관찰/추적)
  #   http://1.1.1.1:8067  → Langfuse UI
  # ─────────────────────────────────────────────
  langfuse:
    image: langfuse/langfuse:3
    container_name: langfuse
    ports:
      - "8067:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/langfuse
      - CLICKHOUSE_URL=http://default:${CLICKHOUSE_PASSWORD:-clickhouse}@clickhouse:8123
      - CLICKHOUSE_MIGRATION_URL=clickhouse://default:${CLICKHOUSE_PASSWORD:-clickhouse}@clickhouse:9000
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-clickhouse}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NEXTAUTH_URL=${LANGFUSE_NEXTAUTH_URL:-http://localhost:8067}
      - NEXTAUTH_SECRET=${LANGFUSE_NEXTAUTH_SECRET}
      - SALT=${LANGFUSE_SALT}
      - ENCRYPTION_KEY=${LANGFUSE_ENCRYPTION_KEY}
      - TELEMETRY_ENABLED=false
      - LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES=false
      - LANGFUSE_S3_EVENT_UPLOAD_BUCKET=langfuse-events
      - LANGFUSE_S3_EVENT_UPLOAD_REGION=auto
      - LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT=http://minio:9000
      - LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID=minio
      - LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY=miniosecret
      - LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE=true
      - LANGFUSE_S3_MEDIA_UPLOAD_BUCKET=langfuse-media
      - LANGFUSE_S3_MEDIA_UPLOAD_REGION=auto
      - LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT=http://minio:9000
      - LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID=minio
      - LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY=miniosecret
      - LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE=true
      - LANGFUSE_S3_BATCH_EXPORT_BUCKET=langfuse-exports
      - LANGFUSE_S3_BATCH_EXPORT_REGION=auto
      - LANGFUSE_S3_BATCH_EXPORT_ENDPOINT=http://minio:9000
      - LANGFUSE_S3_BATCH_EXPORT_ACCESS_KEY_ID=minio
      - LANGFUSE_S3_BATCH_EXPORT_SECRET_ACCESS_KEY=miniosecret
      - LANGFUSE_S3_BATCH_EXPORT_FORCE_PATH_STYLE=true
    depends_on:
      db:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - app-network
    restart: always

  # ─────────────────────────────────────────────
  # Prometheus (메트릭 수집)
  #   http://1.1.1.1:8063  → Prometheus UI
  # ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "8063:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - app-network
    restart: always

  # ─────────────────────────────────────────────
  # Grafana (메트릭 시각화)
  #   http://1.1.1.1:8064  → Grafana UI
  # ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "8064:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    networks:
      - app-network
    restart: always

  # ─────────────────────────────────────────────
  # cAdvisor (컨테이너 리소스 메트릭)
  #   http://1.1.1.1:8065  → cAdvisor UI
  # ─────────────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    privileged: true
    ports:
      - "8065:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    networks:
      - app-network
    restart: always

  # ─────────────────────────────────────────────
  # Keycloak (OAuth2/OIDC Identity Provider)
  #   http://1.1.1.1:8068  → Keycloak Admin Console
  #   /auth/*              → Keycloak OIDC 엔드포인트 (Nginx 통해 노출)
  # ─────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: keycloak
    command: >
      start-dev
      --import-realm
    environment:
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://db:5432/${POSTGRES_DB:-mydb}
      - KC_DB_USERNAME=${POSTGRES_USER:-postgres}
      - KC_DB_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - KC_DB_SCHEMA=keycloak
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN_USER:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
      - KC_HTTP_PORT=8080
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME_STRICT_HTTPS=false
      - KC_PROXY_HEADERS=xforwarded
      - KC_HTTP_ENABLED=true
    ports:
      - "8068:8080"
    volumes:
      - ./keycloak/realm-import.json:/opt/keycloak/data/import/realm-import.json:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080; printf \"GET /realms/master/.well-known/openid-configuration HTTP/1.0\\r\\nHost: 127.0.0.1\\r\\n\\r\\n\" >&3; cat <&3' 2>/dev/null | grep -q 'issuer'"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
  grafana-storage:
  prometheus-data:
  clickhouse-data:
  minio-data:
