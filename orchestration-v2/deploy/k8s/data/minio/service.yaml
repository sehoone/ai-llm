# headless — MinIO 분산 노드 간 통신
apiVersion: v1
kind: Service
metadata:
  name: minio-headless
  namespace: llm-platform
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/part-of: llm-platform
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
---
# ClusterIP — 앱·Langfuse 에서 S3 API 접근용
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: llm-platform
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/part-of: llm-platform
spec:
  selector:
    app.kubernetes.io/name: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
