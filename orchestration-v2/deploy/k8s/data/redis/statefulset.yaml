apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: llm-platform
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: llm-platform
spec:
  serviceName: redis-headless
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/part-of: llm-platform
    spec:
      # 각 pod 를 다른 노드에 배치
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: redis
                topologyKey: kubernetes.io/hostname

      initContainers:
        - name: init-config
          image: redis:7-alpine
          command: ["/bin/sh", "/scripts/init.sh"]
          volumeMounts:
            - name: data
              mountPath: /data
            - name: init-scripts
              mountPath: /scripts

      containers:
        # ── redis-server ─────────────────────────────────────────────────
        - name: redis
          image: redis:7-alpine
          command: ["redis-server", "/data/redis.conf"]
          ports:
            - name: redis
              containerPort: 6379
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /data

        # ── redis-sentinel (사이드카) ─────────────────────────────────────
        - name: sentinel
          image: redis:7-alpine
          command: ["redis-sentinel", "/data/sentinel.conf"]
          ports:
            - name: sentinel
              containerPort: 26379
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            exec:
              command: ["redis-cli", "-p", "26379", "ping"]
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data

      volumes:
        - name: init-scripts
          configMap:
            name: redis-init-script
            defaultMode: 0755

  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: fast-ssd   # 클러스터 StorageClass 이름으로 변경
        resources:
          requests:
            storage: 5Gi
