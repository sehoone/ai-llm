# headless service — StatefulSet pod 간 DNS 해석 (redis-0.redis-headless, ...)
apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  namespace: llm-platform
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: llm-platform
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
    - name: sentinel
      port: 26379
      targetPort: 26379
---
# ClusterIP service — 앱이 redis 에 접속할 때 사용 (sentinel 을 통한 master 탐색)
apiVersion: v1
kind: Service
metadata:
  name: redis-sentinel
  namespace: llm-platform
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: sentinel
    app.kubernetes.io/part-of: llm-platform
spec:
  selector:
    app.kubernetes.io/name: redis
  ports:
    - name: sentinel
      port: 26379
      targetPort: 26379
---
# ClusterIP service — redis master 직접 접속 (Langfuse 등 sentinel 미지원 클라이언트용)
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: llm-platform
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: master
    app.kubernetes.io/part-of: llm-platform
spec:
  selector:
    app.kubernetes.io/name: redis
    statefulset.kubernetes.io/pod-name: redis-0
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
