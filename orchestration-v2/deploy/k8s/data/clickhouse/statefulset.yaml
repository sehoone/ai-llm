apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse
  namespace: llm-platform
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/part-of: llm-platform
spec:
  serviceName: clickhouse
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: clickhouse
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clickhouse
        app.kubernetes.io/part-of: llm-platform
    spec:
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24.1
          ports:
            - name: http
              containerPort: 8123
            - name: tcp
              containerPort: 9000
            - name: keeper
              containerPort: 2181
          env:
            - name: CLICKHOUSE_DB
              value: default
            - name: CLICKHOUSE_USER
              value: default
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: CLICKHOUSE_PASSWORD
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: config
              mountPath: /etc/clickhouse-server/config.d/cluster.xml
              subPath: config.xml
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: clickhouse-config
      securityContext:
        fsGroup: 101
      # ulimit nofile 설정 (ClickHouse 권장)
      initContainers:
        - name: set-ulimits
          image: busybox:1.36
          command: ["sh", "-c", "ulimit -n 262144 || true"]
          securityContext:
            privileged: true

  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: fast-ssd
        resources:
          requests:
            storage: 20Gi
