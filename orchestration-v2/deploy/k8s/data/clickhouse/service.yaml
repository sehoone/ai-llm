apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: llm-platform
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/part-of: llm-platform
spec:
  selector:
    app.kubernetes.io/name: clickhouse
  ports:
    - name: http
      port: 8123
      targetPort: 8123
    - name: tcp
      port: 9000
      targetPort: 9000
    - name: keeper
      port: 2181
      targetPort: 2181
