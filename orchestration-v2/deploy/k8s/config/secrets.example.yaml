# secrets.example.yaml — 필요한 Secret 구조 예시
# 실제 값은 scripts/create-secrets.sh 가 .env 파일로부터 자동 생성합니다.
# 이 파일을 직접 수정해 kubectl apply 하지 마세요 (평문 노출 위험).
#
# 수동 생성이 필요한 경우:
#   cp secrets.example.yaml secrets.yaml
#   # secrets.yaml 값 채운 후
#   kubectl apply -f secrets.yaml -n llm-platform
#   rm secrets.yaml   # 즉시 삭제
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: llm-platform
type: Opaque
stringData:
  # ── 공통 ─────────────────────────────────────────────────────────────────
  JWT_SECRET_KEY: "your-jwt-secret-key-minimum-32-characters"

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  POSTGRES_PASSWORD: "your-postgres-password"

  # ── LLM API Keys ─────────────────────────────────────────────────────────
  OPENAI_API_KEY: "sk-..."
  ANTHROPIC_API_KEY: "sk-ant-..."
  # GOOGLE_API_KEY: ""
  # AZURE_OPENAI_API_KEY: ""

  # ── Langfuse ─────────────────────────────────────────────────────────────
  LANGFUSE_SECRET_KEY: "sk-lf-..."
  LANGFUSE_PUBLIC_KEY: "pk-lf-..."
  LANGFUSE_NEXTAUTH_SECRET: "your-nextauth-secret-min-32-chars"
  LANGFUSE_SALT: "your-salt-min-32-chars"
  LANGFUSE_ENCRYPTION_KEY: "your-32-byte-hex-encryption-key"   # 64자 hex

  # ── ClickHouse ────────────────────────────────────────────────────────────
  CLICKHOUSE_PASSWORD: "clickhouse"

  # ── MinIO ─────────────────────────────────────────────────────────────────
  MINIO_ROOT_USER: "minio"
  MINIO_ROOT_PASSWORD: "miniosecret"

  # ── Grafana ───────────────────────────────────────────────────────────────
  GRAFANA_ADMIN_PASSWORD: "admin"
---
# CloudNativePG PostgreSQL 슈퍼유저 Secret
# cluster.yaml 의 bootstrap.initdb.secret 에서 참조
apiVersion: v1
kind: Secret
metadata:
  name: postgres-superuser
  namespace: llm-platform
type: kubernetes.io/basic-auth
stringData:
  username: "postgres"
  password: "your-postgres-password"   # app-secrets 의 POSTGRES_PASSWORD 와 동일해야 함
