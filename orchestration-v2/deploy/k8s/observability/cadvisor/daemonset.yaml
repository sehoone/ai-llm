# cAdvisor — 모든 노드에 배포해 컨테이너 리소스 메트릭 수집
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cadvisor
  namespace: llm-platform
  labels:
    app.kubernetes.io/name: cadvisor
    app.kubernetes.io/part-of: llm-platform
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: cadvisor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cadvisor
        app.kubernetes.io/part-of: llm-platform
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: cadvisor
          image: gcr.io/cadvisor/cadvisor:latest
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 512Mi
          volumeMounts:
            - name: rootfs
              mountPath: /rootfs
              readOnly: true
            - name: var-run
              mountPath: /var/run
              readOnly: true
            - name: sys
              mountPath: /sys
              readOnly: true
            - name: docker
              mountPath: /var/lib/docker
              readOnly: true
          securityContext:
            privileged: true
      volumes:
        - name: rootfs
          hostPath:
            path: /
        - name: var-run
          hostPath:
            path: /var/run
        - name: sys
          hostPath:
            path: /sys
        - name: docker
          hostPath:
            path: /var/lib/docker
---
apiVersion: v1
kind: Service
metadata:
  name: cadvisor
  namespace: llm-platform
  labels:
    app.kubernetes.io/name: cadvisor
    app.kubernetes.io/part-of: llm-platform
spec:
  selector:
    app.kubernetes.io/name: cadvisor
  ports:
    - name: http
      port: 8080
      targetPort: 8080
