apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse
  namespace: llm-platform
  labels:
    app.kubernetes.io/name: langfuse
    app.kubernetes.io/part-of: llm-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: langfuse
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: langfuse
        app.kubernetes.io/part-of: llm-platform
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: langfuse
                topologyKey: kubernetes.io/hostname

      containers:
        - name: langfuse
          image: langfuse/langfuse:3
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: DATABASE_URL
              value: "postgresql://postgres:$(POSTGRES_PASSWORD)@postgres-ha-rw:5432/mydb"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_PASSWORD
            - name: CLICKHOUSE_URL
              value: "http://default:$(CLICKHOUSE_PASSWORD)@clickhouse:8123"
            - name: CLICKHOUSE_MIGRATION_URL
              value: "clickhouse://default:$(CLICKHOUSE_PASSWORD)@clickhouse:9000"
            - name: CLICKHOUSE_USER
              value: default
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: CLICKHOUSE_PASSWORD
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: NEXTAUTH_URL
              value: "http://localhost:3000"   # Ingress 외부 주소로 변경
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: LANGFUSE_NEXTAUTH_SECRET
            - name: SALT
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: LANGFUSE_SALT
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: LANGFUSE_ENCRYPTION_KEY
            - name: TELEMETRY_ENABLED
              value: "false"
            - name: LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES
              value: "false"
            # MinIO S3 설정
            - name: LANGFUSE_S3_EVENT_UPLOAD_BUCKET
              value: langfuse-events
            - name: LANGFUSE_S3_EVENT_UPLOAD_REGION
              value: auto
            - name: LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT
              value: http://minio:9000
            - name: LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MINIO_ROOT_USER
            - name: LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MINIO_ROOT_PASSWORD
            - name: LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE
              value: "true"
            - name: LANGFUSE_S3_MEDIA_UPLOAD_BUCKET
              value: langfuse-media
            - name: LANGFUSE_S3_MEDIA_UPLOAD_REGION
              value: auto
            - name: LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT
              value: http://minio:9000
            - name: LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MINIO_ROOT_USER
            - name: LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MINIO_ROOT_PASSWORD
            - name: LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE
              value: "true"
            - name: LANGFUSE_S3_BATCH_EXPORT_BUCKET
              value: langfuse-exports
            - name: LANGFUSE_S3_BATCH_EXPORT_REGION
              value: auto
            - name: LANGFUSE_S3_BATCH_EXPORT_ENDPOINT
              value: http://minio:9000
            - name: LANGFUSE_S3_BATCH_EXPORT_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MINIO_ROOT_USER
            - name: LANGFUSE_S3_BATCH_EXPORT_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MINIO_ROOT_PASSWORD
            - name: LANGFUSE_S3_BATCH_EXPORT_FORCE_PATH_STYLE
              value: "true"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api/public/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/public/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
