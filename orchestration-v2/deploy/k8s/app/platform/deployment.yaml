# platform-server (Spring Boot) — 인증·사용자·LLM 리소스 관리
# 이미지: deploy.sh 에서 REGISTRY / TAG 환경변수로 주입됨
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform
  namespace: llm-platform
  labels:
    app.kubernetes.io/name: platform
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: llm-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: platform
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: platform
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: llm-platform
    spec:
      # 두 replica 를 다른 노드에 배치
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: platform
                topologyKey: kubernetes.io/hostname

      # DB 준비 대기
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-ha-rw 5432; do
                echo "waiting for postgres..."; sleep 3
              done

      containers:
        - name: platform
          image: ${REGISTRY}/platform-server:${TAG}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: APP_ENV
              value: production
            - name: SERVER_PORT
              value: "8080"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres-ha-rw:5432/mydb?currentSchema=llmonl"
            - name: SPRING_DATASOURCE_USERNAME
              value: postgres
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_PASSWORD
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_SECRET_KEY
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5
