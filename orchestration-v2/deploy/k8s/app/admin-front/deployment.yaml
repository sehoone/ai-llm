# admin-front (Next.js) — 관리자 프론트엔드
# NEXT_PUBLIC_* 변수는 빌드 타임 주입 → 이미지 빌드 시 .env.production 필요
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-front
  namespace: llm-platform
  labels:
    app.kubernetes.io/name: admin-front
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: llm-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: admin-front
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: admin-front
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: llm-platform
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: admin-front
                topologyKey: kubernetes.io/hostname

      containers:
        - name: admin-front
          image: ${REGISTRY}/admin-front:${TAG}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            # Next.js server-side → platform-server 내부 통신
            - name: API_URL
              value: "http://platform:8080"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
