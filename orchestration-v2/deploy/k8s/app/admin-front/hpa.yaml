apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: admin-front-hpa
  namespace: llm-platform
  labels:
    app.kubernetes.io/name: admin-front
    app.kubernetes.io/part-of: llm-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: admin-front
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
