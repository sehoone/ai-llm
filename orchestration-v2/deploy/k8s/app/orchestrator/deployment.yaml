# orchestrator-server (FastAPI) — LLM 채팅·RAG·워크플로우·음성 평가
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: llm-platform
  labels:
    app.kubernetes.io/name: orchestrator
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: llm-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: orchestrator
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orchestrator
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: llm-platform
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: orchestrator
                topologyKey: kubernetes.io/hostname

      initContainers:
        - name: wait-for-platform
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z platform 8080; do
                echo "waiting for platform-server..."; sleep 3
              done

      containers:
        - name: orchestrator
          image: ${REGISTRY}/orchestrator-server:${TAG}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: APP_ENV
              value: production
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_PASSWORD
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_SECRET_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: OPENAI_API_KEY
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: ANTHROPIC_API_KEY
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: LANGFUSE_SECRET_KEY
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: LANGFUSE_PUBLIC_KEY
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
