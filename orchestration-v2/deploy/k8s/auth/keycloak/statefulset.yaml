# Keycloak 26 HA — JDBC clustering (Infinispan + JGroups DNS)
# replicas: 2  → 하나 장애 시에도 인증 서비스 유지
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: keycloak
  namespace: llm-platform
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: llm-platform
spec:
  serviceName: keycloak-headless
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak
        app.kubernetes.io/part-of: llm-platform
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: keycloak
                topologyKey: kubernetes.io/hostname

      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.2
          args:
            - start
            - --import-realm
          ports:
            - name: http
              containerPort: 8080
            - name: jgroups
              containerPort: 7600
          env:
            # DB
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: "jdbc:postgresql://postgres-ha-rw:5432/mydb"
            - name: KC_DB_USERNAME
              value: postgres
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_PASSWORD
            - name: KC_DB_SCHEMA
              value: keycloak
            # 관리자
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: KEYCLOAK_ADMIN_USER
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: KEYCLOAK_ADMIN_PASSWORD
            # 네트워크
            - name: KC_HTTP_PORT
              value: "8080"
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_HOSTNAME_STRICT_HTTPS
              value: "false"
            - name: KC_PROXY_HEADERS
              value: xforwarded
            - name: KC_HTTP_ENABLED
              value: "true"
            # HA 클러스터링 — K8s DNS 기반 JGroups 피어 발견
            - name: KC_CACHE
              value: ispn
            - name: KC_CACHE_STACK
              value: kubernetes
            - name: JAVA_OPTS_APPEND
              value: >-
                -Djgroups.dns.query=keycloak-headless.llm-platform.svc.cluster.local
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /realms/master/.well-known/openid-configuration
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /realms/master/.well-known/openid-configuration
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 10
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import
              readOnly: true

      volumes:
        # deploy.sh 에서 kubectl create configmap keycloak-realm 으로 생성
        - name: realm-import
          configMap:
            name: keycloak-realm
