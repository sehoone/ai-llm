# NGINX Ingress — nginx.conf 라우팅 규칙을 K8s Ingress 로 변환
#
# 사전 요구사항:
#   kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.1/deploy/static/provider/cloud/deploy.yaml
#
# host 를 실제 도메인으로 변경 (또는 nip.io 형식 사용: <ip>.nip.io)
---
# ── WebSocket 전용 Ingress (voice-evaluation) ────────────────────────────
# proxy-read-timeout 86400 + WebSocket upgrade 헤더가 필요해 별도 분리
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-websocket
  namespace: llm-platform
  labels:
    app.kubernetes.io/part-of: llm-platform
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "86400"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "86400"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  ingressClassName: nginx
  rules:
    - host: your-domain.com   # 실제 도메인으로 변경
      http:
        paths:
          - path: /api/v1/voice-evaluation/ws/
            pathType: Prefix
            backend:
              service:
                name: orchestrator
                port:
                  number: 8000
---
# ── 메인 Ingress (API, 프론트엔드) ─────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-main
  namespace: llm-platform
  labels:
    app.kubernetes.io/part-of: llm-platform
  annotations:
    # SSE 스트리밍 (LLM chat) — 버퍼 비활성화
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-cache: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "86400"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "86400"
    # WebSocket (Next.js HMR 등)
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
spec:
  ingressClassName: nginx
  rules:
    - host: your-domain.com   # 실제 도메인으로 변경
      http:
        paths:
          # platform-server — /api/ 전체 (platform 내부에서 orchestrator 로 중계)
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: platform
                port:
                  number: 8080
          # Next.js 프론트엔드
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-front
                port:
                  number: 3000
---
# ── Langfuse UI (별도 접근) ───────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-langfuse
  namespace: llm-platform
  labels:
    app.kubernetes.io/part-of: llm-platform
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
spec:
  ingressClassName: nginx
  rules:
    - host: langfuse.your-domain.com   # 실제 도메인으로 변경
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: langfuse
                port:
                  number: 3000
