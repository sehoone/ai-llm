spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;INIT=CREATE SCHEMA IF NOT EXISTS llmonl
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        default_schema: llmonl
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: false

jwt:
  secret-key: test-secret-key-must-be-at-least-32-chars-long!!

logging:
  level:
    root: WARN
    com.llmonl.platform: INFO
