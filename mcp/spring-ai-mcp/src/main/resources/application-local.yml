server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/sample_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

management:
  endpoint:
    health:
      show-details: always

app:
  todo:
    base-url: https://jsonplaceholder.typicode.com
  auth:
    jwt:
      # 로컬 개발용 시크릿키 — 운영 환경에서는 JWT_SECRET 환경변수로 교체
      # 256비트(32바이트) Base64: openssl rand -base64 32
      secret: bG9jYWwtZGV2LXNlY3JldC1rZXktMzItYnl0ZXMhISE=
