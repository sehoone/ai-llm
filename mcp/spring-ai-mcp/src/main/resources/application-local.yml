server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/sample_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

management:
  endpoint:
    health:
      show-details: always

app:
  todo:
    base-url: https://jsonplaceholder.typicode.com

