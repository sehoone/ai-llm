spring:
  application:
    name: spring-ai-mcp-server

  ai:
    mcp:
      server:
        name: Spring AI MCP Server
        version: 1.0.0
        protocol: STREAMABLE
        streamable-http:
          mcp-endpoint: /mcp

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.mcpserver.sample.db.entity
  configuration:
    map-underscore-to-camel-case: true

app:
  auth:
    jwt:
      # JWT_SECRET: HMAC-SHA256 서명 검증용 시크릿키 (Base64 인코딩, 256비트 이상 권장)
      secret: ${JWT_SECRET}

server:
  forward-headers-strategy: FRAMEWORK

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
