server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

management:
  server:
    port: 8081
  endpoint:
    health:
      show-details: never

app:
  security:
    api-key: ${API_KEY}
  todo:
    base-url: ${TODO_API_URL}
