server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/sample_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    baseline-on-migrate: true

management:
  endpoint:
    health:
      show-details: always

app:
  security:
    api-key: local-dev-key-not-for-production
  todo:
    base-url: https://jsonplaceholder.typicode.com
