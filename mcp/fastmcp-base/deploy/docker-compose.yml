services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fastmcp_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../scripts/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fastmcp_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  mcp:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "${MCP_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── 로그 모니터링 스택 (--profile monitoring) ──────────────────────────────
  loki:
    image: grafana/loki:3.4
    expose:
      - "3100"
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    profiles:
      - monitoring
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.4
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_positions:/var/log/promtail
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    profiles:
      - monitoring
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.6
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - loki
    profiles:
      - monitoring
    restart: unless-stopped

  # ── HTTPS 종단 (--profile nginx) ─────────────────────────────────────────────
  # SSL 인증서를 deploy/ssl/cert.pem, deploy/ssl/key.pem 에 배치 후 사용
  # Let's Encrypt: certbot certonly --standalone -d your-domain.com
  nginx:
    image: nginx:1.27-alpine
    command:
      - /bin/sh
      - -c
      - |
        TMPL=/etc/nginx/nginx.conf.template
        [ "$${NGINX_MODE}" = "http" ] && TMPL=/etc/nginx/nginx-http.conf.template
        envsubst '$$DOMAIN' < $$TMPL > /etc/nginx/nginx.conf
        exec nginx -g 'daemon off;'
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      NGINX_MODE: ${NGINX_MODE:-https}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf.template:/etc/nginx/nginx.conf.template:ro
      - ./nginx-http.conf.template:/etc/nginx/nginx-http.conf.template:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - mcp
    profiles:
      - nginx
    restart: unless-stopped

volumes:
  pgdata:
  loki_data:
  grafana_data:
  promtail_positions:
