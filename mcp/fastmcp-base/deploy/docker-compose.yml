services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fastmcp_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fastmcp_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  initdb:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: uv run python main.py init tables
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  mcp:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "${MCP_PORT:-8000}:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      initdb:
        condition: service_completed_successfully
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:8
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      - postgres
    profiles:
      - admin
    restart: unless-stopped

volumes:
  pgdata:
