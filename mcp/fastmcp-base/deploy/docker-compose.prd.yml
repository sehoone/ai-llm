services:
  mcp:
    restart: always
    ports: []  # nginx가 외부 트래픽을 처리 — mcp 포트 직접 노출 안 함
    env_file: .env.prd
    environment:
      LOG_LEVEL: WARNING
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  postgres:
    restart: always
    ports: []
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  nginx:
    restart: always
    profiles: []  # prd에서는 기본으로 활성화 (profile 제거)
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
