name: mcp-platform

services:

  # ── PostgreSQL (두 DB 공유: llm_db + sample_db) ─────────────────
  db:
    image: postgres:16-alpine
    container_name: mcp-platform-db
    environment:
      POSTGRES_DB: ${PLATFORM_DB:-llm_db}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MCP_DB: ${MCP_DB:-sample_db}
    volumes:
      - mcp-platform-db:/var/lib/postgresql/data
      - ./initdb/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    # llmonl.users 테이블이 실제로 존재하는지 확인 — init.sh 완료 보장
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} && psql -U $${POSTGRES_USER} -d $${POSTGRES_DB} -c 'SELECT 1 FROM llmonl.users LIMIT 1' >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s
    restart: unless-stopped

  # ── platform (인증 · 사용자 · API 키 관리) ────────────────────────
  platform:
    build:
      context: ../platform-server
      dockerfile: Dockerfile
    image: mcp-platform/platform:latest
    container_name: mcp-platform-platform
    ports:
      - "${PLATFORM_PORT:-8080}:8080"
      # 관리 포트는 외부 미노출 — 모니터링 스택만 내부에서 접근
    environment:
      APP_ENV: development
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${PLATFORM_DB:-llm_db}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_SCHEMA: llmonl
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_MINUTES:-10}
      JWT_REFRESH_TOKEN_EXPIRE_MINUTES: ${JWT_REFRESH_MINUTES:-10080}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL:-}
      SUPERADMIN_USERNAME: ${SUPERADMIN_USERNAME:-superadmin}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-}
      SERVER_PORT: 8080
      MANAGEMENT_PORT: 8081
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m
    restart: unless-stopped

  # ── mcp (MCP 서버 — API 키로 인증) ───────────────────────────────
  mcp:
    build:
      context: ../spring-ai-mcp
      dockerfile: deploy/Dockerfile
    image: mcp-platform/mcp:latest
    container_name: mcp-platform-mcp
    ports:
      - "${MCP_PORT:-8081}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://db:5432/${MCP_DB:-sample_db}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      PLATFORM_URL: http://platform:8080
      INTERNAL_SECRET: ${INTERNAL_SECRET:-}
      TODO_API_URL: ${TODO_API_URL:-https://jsonplaceholder.typicode.com}
    depends_on:
      db:
        condition: service_healthy
      platform:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 768m
        reservations:
          memory: 384m
    restart: unless-stopped

  # ── nginx (리버스 프록시) ─────────────────────────────────────────
  # 포트 80 단일 진입점: / → admin, /api/ → platform, /mcp → mcp
  # NEXT_PUBLIC_API_URL 을 서버 IP(포트 불필요)로 설정 가능
  nginx:
    image: nginx:alpine
    container_name: mcp-platform-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - admin
      - platform
      - mcp
    restart: unless-stopped

  # ── admin (Next.js 관리 UI) ───────────────────────────────────────
  # NEXT_PUBLIC_API_URL 은 빌드 시 번들에 포함됩니다.
  # Nginx 경유 시 http://SERVER_IP (포트 없음), 직접 접근 시 http://SERVER_IP:8080
  admin:
    build:
      context: ../admin-front
      dockerfile: Dockerfile
      args:
        ENV_FILE: .env.production
    image: mcp-platform/admin:latest
    container_name: mcp-platform-admin
    ports:
      - "${ADMIN_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      API_URL: http://platform:8080
    depends_on:
      - platform
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m
    restart: unless-stopped

volumes:
  mcp-platform-db:

networks:
  default:
    name: mcp-platform-net
