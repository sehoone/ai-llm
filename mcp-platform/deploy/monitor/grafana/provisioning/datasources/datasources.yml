apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      timeInterval: '15s'
      httpMethod: POST

  - name: Loki
    type: loki
    uid: loki
    url: http://loki:3100
    jsonData:
      maxLines: 2000
      derivedFields:
        - name: requestId
          matcherRegex: '"requestId":"([^"]+)"'
          url: ''
          datasourceUid: loki
