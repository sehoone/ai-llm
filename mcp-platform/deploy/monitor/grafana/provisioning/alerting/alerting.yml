apiVersion: 1

# 알림 정책 — contact point는 Grafana UI에서 직접 설정
# Alerting → Contact points → "Add contact point" 에서 이메일/Slack 등 등록
policies:
  - orgId: 1
    receiver: grafana-default-email
    group_by: ['alertname', 'service']
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: grafana-default-email
        matchers:
          - severity =~ "critical|warning"
        group_wait: 10s
        repeat_interval: 1h
