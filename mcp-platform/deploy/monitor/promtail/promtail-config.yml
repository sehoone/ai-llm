server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  # Docker 컨테이너 로그 자동 수집
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          # mcp-platform 프로젝트 컨테이너만 수집
          - name: label
            values: ["com.docker.compose.project=mcp-platform"]

    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container

      - source_labels: ['__meta_docker_compose_service']
        target_label: service

      - source_labels: ['__meta_docker_compose_project']
        target_label: project

      # log_level 라벨 추출 — JSON 로그의 level 필드
      - source_labels: ['__meta_docker_container_name']
        target_label: job
        replacement: 'docker'

    pipeline_stages:

      # spring-ai-mcp / platform-server: stg/prod에서 JSON 로그 파싱
      - match:
          selector: '{service=~"platform|mcp"}'
          stages:
            - json:
                expressions:
                  level: level
                  logger: logger
                  message: message
                  requestId: requestId
            - labels:
                level:
                logger:
                requestId:

      # admin-front: 일반 텍스트 로그
      - match:
          selector: '{service="admin"}'
          stages:
            - regex:
                expression: '(?P<level>INFO|WARN|ERROR|DEBUG)'
            - labels:
                level:
