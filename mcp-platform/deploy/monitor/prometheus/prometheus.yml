global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:

  # platform-server (인증·사용자·API 키) — management port 8081
  - job_name: 'platform'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['platform:8081']
        labels:
          application: 'platform-server'
          service: 'platform'

  # spring-ai-mcp (MCP 서버) — management port 8081 (app은 8080)
  - job_name: 'mcp'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['mcp:8081']
        labels:
          application: 'spring-ai-mcp-server'
          service: 'mcp'

  # PostgreSQL — pg_stat_activity 기본 없음; 컨테이너 상태는 healthcheck으로 추적
  # postgres_exporter 추가 시: targets: ['postgres-exporter:9187']

  # prometheus 자체 메트릭
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
