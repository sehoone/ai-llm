spring:
  application:
    name: llmbackend
  profiles:
    active: dev

jwt:
  secret: ${JWT_SECRET:dGhpcy1pcy1hLXZlcnktbG9uZy1hbmQtc2VjdXJlLXNlY3JldC1rZXktZm9yLWRldmVsb3BtZW50LW9ubHk=}
  access-token-expiry: ${JWT_ACCESS_TOKEN_EXPIRY:1800000}    # 30분
  refresh-token-expiry: ${JWT_REFRESH_TOKEN_EXPIRY:604800000} # 7일

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.multicampus.llmbackend.domain
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs
